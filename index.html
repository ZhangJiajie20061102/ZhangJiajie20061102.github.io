<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D CSS Cube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
        }

        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: flat;
        }

        /* Front Face */
        .cube__face--front {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: translate(0, 0);
        }

        /* Top Face */
        .cube__face--top {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: translate(0, -100%) skewX(-45deg);
            transform-origin: bottom left;
        }

        /* Right Face */
        .cube__face--right {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transform: translate(100%, 0) skewY(-45deg);
            transform-origin: top left;
        }
    </style>
</head>
<body>
    <div class="cube">
        <div class="cube__face--front"></div>
        <div class="cube__face--top"></div>
        <div class="cube__face--right"></div>
    </div>
</body>
</html>
